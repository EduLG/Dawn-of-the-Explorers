services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vtt_user
      POSTGRES_PASSWORD: vtt_password
      POSTGRES_DB: vtt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtt_user -d vtt_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://vtt_user:vtt_password@db:5432/vtt_db
      JWT_SECRET_KEY: dev_secret_key
      FLASK_DEBUG: "True"
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend-react
    volumes:
      - ./frontend-react/src:/app/src
      - ./frontend-react/public:/app/public
      - ./frontend-react/index.html:/app/index.html
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
